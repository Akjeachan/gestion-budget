<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { 
            font-family: Arial, sans-serif; 
            margin: 0;
            padding: 0;
        }
        .container { 
            padding: 20px; 
            background-color: #f4f4f4; 
        }
        .content { 
            background-color: white; 
            padding: 30px; 
            border-radius: 10px;
            max-width: 600px;
            margin: 0 auto;
        }
        .header { 
            color: #333;
            margin-top: 0;
        }
        .button { 
            background-color: #007bff; 
            color: white !important; 
            padding: 12px 30px; 
            text-decoration: none; 
            border-radius: 5px;
            display: inline-block;
            margin-top: 20px;
        }
        .footer {
            margin-top: 30px;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="content">
            <h1 class="header">Bienvenue {{userName}} !</h1>
            <p>Nous sommes ravis de vous accueillir sur notre plateforme.</p>
            <p>Votre email : <strong>{{userEmail}}</strong></p>
            <p>Voici quelques ressources pour commencer :</p>
            <ul>
                <li>Guide de démarrage</li>
                <li>Documentation complète</li>
                <li>Support client 24/7</li>
            </ul>
            <a href="{{linkUrl}}" class="button">Commencer maintenant</a>
            <div class="footer">
                <p>Cordialement,<br><strong>L'équipe {{companyName}}</strong></p>
            </div>
        </div>
    </div>
</body>
</html>
